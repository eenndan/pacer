name: CI

on:
  # main-only push trigger: PR branches are already covered by pull_request, so an
  # unrestricted push trigger would run every PR's CI twice.
  push:
    branches: [main]
    tags: ['v*']          # a release tag also fires the packaging smoke below
  pull_request:
  workflow_dispatch:      # manual trigger for the (slow) packaging smoke

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: build + test + lint (macos-14 / arm64)
    # macos-14 is Apple-silicon (arm64) — matches the project's only pixi platform (osx-arm64).
    runs-on: macos-14
    # Hard ceiling for the whole job: a clean run finishes in a few minutes (cold pixi cache
    # included), so anything past this is a hang — fail fast, never burn the 6-hour default.
    timeout-minutes: 20
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          # gpmf-parser and nanobind are git submodules the C++ build needs.
          submodules: recursive

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          # Pin pixi itself for reproducible CI (matches the committed pixi.lock).
          pixi-version: v0.70.1
          # `locked: true` (the default when pixi.lock is present) installs exactly the lockfile.
          cache: true

      - name: Build (cmake --build via pixi)
        run: pixi run build

      - name: Bindings regen drift gate
        # The build regenerates the bindings glue/stubs in-place (bindings/pacer/CMakeLists.txt),
        # so the committed generated files must match what the locked litgen/black produce.
        run: git diff --exit-code -- bindings/

      - name: Test (ctest via pixi)
        run: pixi run test

      - name: E2E smoke (full StudioWindow offscreen on the bundled GoPro sample)
        # Builds the whole app against 3rdparty/gpmf-parser/samples/hero6.mp4 (checked out with
        # the submodules) — catches load-pipeline regressions the unit tests can't see.
        # --no-video swaps PlayerPane's QMediaPlayer/QAudioOutput/QVideoWidget for inert
        # stand-ins (the PACER_NO_MEDIA seam in studio/player_pane.py): the runner is a headless
        # VM with no media/audio devices, where opening the real ffmpeg/AVFoundation pipeline
        # blocks forever (a previous run hung 27+ min here). Everything the smoke gates — the
        # full Session load, panel construction, sidecar write — still runs. Locally this
        # finishes in seconds, so the 5-min step timeout is pure hang headroom.
        timeout-minutes: 5
        env:
          # Same rationale as the ctest registration (tests/CMakeLists.txt): with no pip install
          # of `pacer` in the fresh CI env, a bare `python -m` from the repo root resolves
          # `import pacer` to the C++ source dir as an EMPTY namespace package. Point the
          # interpreter at the cmake-deployed bindings package explicitly.
          PYTHONPATH: ${{ github.workspace }}/bindings/pacer
        run: QT_QPA_PLATFORM=offscreen pixi run python -m studio.dev._smoke --no-video

      - name: Lint (ruff check via pixi)
        run: pixi run lint

      - name: Format check (clang-format --dry-run --Werror via pixi)
        # Non-mutating gate over the hand-maintained C/C++ files with the env-pinned
        # clang-format (the generated nanobind_pacer.cpp is excluded — owned by the
        # regen-drift gate above).
        run: pixi run fmt-check

      - name: Demo asset reachable (non-blocking)
        # The "Open demo" CTA + `--demo` fetch this clip (studio/demo.py `_DEMO_URL`). It isn't
        # uploaded yet, so this is a NON-BLOCKING reminder (continue-on-error) that surfaces the
        # missing asset without failing the pipeline; it goes green once the demo `.mp4` is attached
        # to the release. Keep the URL in sync with studio/demo.py._DEMO_URL.
        continue-on-error: true
        run: |
          URL="https://github.com/eenndan/pacer/releases/download/v0.1.0/pacer-demo-lap.mp4"
          CODE=$(curl -sIL -o /dev/null -w '%{http_code}' "$URL")
          if [ "$CODE" = "200" ]; then
            echo "demo asset OK ($URL)"
          else
            echo "::warning::demo asset unreachable (HTTP $CODE) — 'Open demo' / --demo will fail until it's uploaded: $URL"
          fi

  package-smoke:
    name: package .app build-only smoke (tag / manual)
    # A full PyInstaller build is slow and only matters at release, so this runs ONLY on a version
    # tag or a manual dispatch — never on a PR. BUILD-ONLY: it does NOT launch the .app (the app
    # blocks in exec(), it would hang) and does NOT build/upload a .dmg — it just proves the bundle
    # is well-formed, so spec rot (a hidden-import miss, a datas typo, a dropped QtMultimedia plugin)
    # can't ship a .app that crashes on launch with the rest of CI green.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true
      - name: Build the C++ core + bindings
        run: pixi run build
      - name: Build the .app (PyInstaller — no .dmg)
        # Same rationale as the ctest/smoke PYTHONPATH: point `import pacer` at the cmake-deployed
        # bindings package so the spec bundles the real _pacer.so on a fresh CI env.
        env:
          PYTHONPATH: ${{ github.workspace }}/bindings/pacer
        run: |
          pixi run python -m pip install pyinstaller
          pixi run pyinstaller --noconfirm --clean packaging/pacer.spec
      - name: Assert the .app bundle is well-formed
        run: |
          APP="dist/Pacer Studio.app"
          test -d "$APP" || { echo "::error::PyInstaller produced no $APP"; exit 1; }
          find "$APP/Contents/MacOS" -maxdepth 1 -type f -perm +111 | grep -q . \
            || { echo "::error::no executable in $APP/Contents/MacOS"; exit 1; }
          find "$APP" -name '_pacer*.so' | grep -q . \
            || { echo "::error::the compiled _pacer core is missing from the bundle"; exit 1; }
          find "$APP" -name 'ffmpeg' | grep -q . \
            || { echo "::error::ffmpeg is missing from the bundle (video export would break)"; exit 1; }
          echo "bundle OK ($(du -sh "$APP" | cut -f1))"
